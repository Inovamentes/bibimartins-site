server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: ON_PARAM

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bibimartins}
    username: ${SPRING_DATASOURCE_USERNAME:bibimartins}
    password: ${SPRING_DATASOURCE_PASSWORD:bibimartins}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# JWT Secret: em produção, defina JWT_SECRET no Render (mínimo 32 caracteres)
jwt:
  secret: ${JWT_SECRET:bibimartins-super-secret-key-2025-neurodiversa-lideranca-dev}
