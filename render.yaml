services:
  - type: web
    name: bibimartins-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false   # Defina manualmente no painel do Render
      - key: SPRING_DATASOURCE_USERNAME
        sync: false   # Defina manualmente no painel do Render
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false   # Defina manualmente no painel do Render
      - key: JWT_SECRET
        sync: false   # Defina manualmente no painel do Render (mínimo 32 chars)
